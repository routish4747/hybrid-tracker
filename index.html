// ═══════════════════════════════════════════
// PERSISTENCE HOOKS
// ═══════════════════════════════════════════
function useLS(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  }, [key, val]);
  return [val, setVal];
}
function useDailyLS(key, init) {
  const today = new Date().toISOString().split('T')[0];
  return useLS(key + '_' + today, init);
}

// ═══════════════════════════════════════════
// GYM TRACKER COMPONENT
// ═══════════════════════════════════════════
function GymTracker() {
  const [weekMode, setWeekMode] = useLS('gym_weekMode', 'normal');
  const [activeDay, setActiveDay] = useState(() => {
    const d = new Date().getDay();
    return {0:"sun",1:"mon_am",2:"tue",3:"wed",4:"thu",5:"fri",6:"sat"}[d];
  });
  const [sets, setSets] = useLS('gym_sets', {});
  const [adding, setAdding] = useState(null);
  const [weight, setWeight] = useState('');
  const [reps, setReps] = useState('');
  const [showTip, setShowTip] = useState(null);
  const [view, setView] = useState('plan');
  const [restOn, setRestOn] = useState(false);
  const [restSec, setRestSec] = useState(0);
  const [restTarget, setRestTarget] = useState(90);
  const [restExName, setRestExName] = useState('');

  useEffect(() => { if(!restOn) return; const i=setInterval(()=>setRestSec(s=>s+1),1000); return ()=>clearInterval(i); }, [restOn]);

  const getDay = dk => weekMode==='deload' ? deloadDay(DAYS[dk]) : (MODE_OVERRIDES[weekMode]?.[dk] || DAYS[dk]);
  const getIcon = dk => MODE_ICONS[weekMode]?.[dk] || TAG_IC[dk];
  const gymDays = MODE_GYM[weekMode] || MODE_GYM.normal;

  const day = getDay(activeDay);
  const daySets = sets[activeDay] || [];
  const isGym = gymDays.includes(activeDay);

  const logSet = exId => {
    if(!reps && isGym) return;
    setSets(p => ({...p, [activeDay]: [...(p[activeDay]||[]), {id:Date.now(),exercise:exId,weight:parseFloat(weight)||0,reps:reps||'✓',ts:Date.now()}]}));
    setAdding(null); setWeight(''); setReps('');
    const ex = day.exercises.find(e=>e.id===exId);
    if(ex?.rest>0){setRestOn(true);setRestSec(0);setRestTarget(ex.rest);setRestExName(ex.name);}
  };
  const del = id => setSets(p => ({...p,[activeDay]:(p[activeDay]||[]).filter(s=>s.id!==id)}));
  const sFor = exId => daySets.filter(s=>s.exercise===exId);

  const prog = day.exercises.reduce((s,e)=>s+Math.min(sFor(e.id).length,e.sets),0);
  const total = day.exercises.reduce((s,e)=>s+e.sets,0);
  const pct = total>0?Math.round(prog/total*100):0;
  const vol = daySets.reduce((s,x)=>s+(parseFloat(x.weight)||0)*(parseInt(x.reps)||0),0);

  const getMotivation = () => {
    if(daySets.length===0) return null;
    const seed = Math.floor((daySets[0]?.ts||0)/100000);
    if(pct===100){const m=["Full session crushed. Recovery starts now — eat big, sleep hard. 🔥","100% done. That discipline compounds week after week. 💪","Every set done. Your future self thanks you. 👑","Session complete. Protein shake time. 🏆"];return m[seed%m.length];}
    if(pct>=70){const m=["Solid session. Key movements nailed — that's what matters. 💪","Most of the work done. Gains come from the compounds you hit. 👊"];return m[seed%m.length];}
    if(pct>=40){const m=["Half a workout beats no workout every single time. 🤙","Short session but you still trained. Consistency over perfection. 💪","Progress isn't linear. Shorter today keeps momentum for next time. 🔥"];return m[seed%m.length];}
    const m=["You showed up. That's the hardest part. Even a few sets keep the habit alive. 🤙","Light day? No stress. One set is infinitely better than zero. 💪"];return m[seed%m.length];
  };
  const mot = getMotivation();

  const weekProg = DAY_ORDER.reduce((acc,dk)=>{const d=getDay(dk);const ds=sets[dk]||[];const p=d.exercises.reduce((s,e)=>s+Math.min(ds.filter(x=>x.exercise===e.id).length,e.sets),0);const t=d.exercises.reduce((s,e)=>s+e.sets,0);acc[dk]={done:p,total:t};return acc;},{});

  return (
    <div style={{padding:'14px 12px',maxWidth:480,margin:'0 auto'}}>
      {/* Week mode */}
      <div style={{display:'flex',gap:6,marginBottom:10}}>
        {WEEK_MODES.map(m=>(
          <button key={m.id} onClick={()=>setWeekMode(m.id)} style={{flex:1,padding:'8px 4px',borderRadius:8,cursor:'pointer',...S,textAlign:'center',background:weekMode===m.id?'#1a1a1a':'transparent',border:weekMode===m.id?'1px solid #e74c3c44':'1px solid #1a1a1a',color:weekMode===m.id?'#fff':'#444'}}>
            <div style={{fontSize:14}}>{m.icon}</div>
            <div style={{fontSize:9,marginTop:2}}>{m.label}</div>
          </button>
        ))}
      </div>

      {/* Day selector */}
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:8,marginBottom:12,WebkitOverflowScrolling:'touch'}}>
        {DAY_ORDER.map(dk=>{const d=getDay(dk);const a=activeDay===dk;const wp=weekProg[dk];const done=wp.total>0&&wp.done>=wp.total;
          return(<button key={dk} onClick={()=>{setActiveDay(dk);setAdding(null);setShowTip(null);setView('plan');}} style={{flexShrink:0,padding:'8px 12px',borderRadius:10,border:a?'1px solid #333':'1px solid transparent',cursor:'pointer',...S,background:a?'#1a1a1a':'transparent',textAlign:'center',minWidth:56}}>
            <div style={{fontSize:16,marginBottom:2}}>{getIcon(dk)}</div>
            <div style={{fontSize:10,color:a?'#fff':'#555',fontWeight:a?700:400}}>{d.label.replace(/Monday/,'Mon').replace(/Tuesday/,'Tue').replace(/Wednesday/,'Wed').replace(/Thursday/,'Thu').replace(/Friday/,'Fri').replace(/Saturday/,'Sat').replace(/Sunday/,'Sun')}</div>
            {wp.total>0&&<div style={{marginTop:3,height:2,background:'#222',borderRadius:1,overflow:'hidden'}}><div style={{height:'100%',width:`${wp.done/wp.total*100}%`,background:done?'#27ae60':'#e74c3c',transition:'width .3s'}}/></div>}
          </button>);
        })}
      </div>

      {/* Day header */}
      <div style={{marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
          <span style={{fontSize:22}}>{getIcon(activeDay)}</span>
          <div><div style={{fontSize:10,letterSpacing:2,color:MC[day.exercises[0]?.muscle]||'#e74c3c',textTransform:'uppercase'}}>{day.tag}</div><div style={{fontSize:18,fontWeight:700,color:'#fff'}}>{day.label}</div></div>
          {isGym&&<div style={{marginLeft:'auto',fontSize:12,color:'#555'}}>{prog}/{total}</div>}
        </div>
        <div style={{fontSize:11,color:'#666',lineHeight:1.5}}>{day.desc}</div>
        {isGym&&<div style={{marginTop:8,height:3,background:'#1a1a1a',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,borderRadius:2,background:pct===100?'#27ae60':'linear-gradient(90deg,#e74c3c,#e67e22)',transition:'width .4s'}}/></div>}
      </div>

      {/* Rest timer */}
      {restOn&&(
        <div style={{marginBottom:12,padding:'10px 14px',borderRadius:8,border:`1px solid ${restSec>=restTarget?'#27ae6044':'#e67e2233'}`,background:restSec>=restTarget?'#0a1a0a':'#111'}}>

            <div><span style={{fontSize:10,color:'#777',letterSpacing:1}}>REST </span><span style={{fontSize:10,color:'#555'}}>— {restExName}</span></div>
            <button onClick={()=>{setRestOn(false);setRestSec(0);}} style={{background:'none',border:'1px solid #333',color:'#777',padding:'3px 10px',borderRadius:4,cursor:'pointer',fontSize:10,...S}}>✕</button>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:28,fontWeight:700,fontVariantNumeric:'tabular-nums',color:restSec>=restTarget?'#27ae60':restSec>=restTarget*.7?'#e67e22':'#fff'}}>{fmt(restSec)}</span>

              <div style={{height:4,background:'#1a1a1a',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',borderRadius:2,transition:'width .3s',width:`${Math.min(restSec/restTarget*100,100)}%`,background:restSec>=restTarget?'#27ae60':'linear-gradient(90deg,#e67e22,#e74c3c)'}}/></div>
              <div style={{fontSize:9,color:'#555',marginTop:3,display:'flex',justifyContent:'space-between'}}><span>{restSec>=restTarget?'✓ Go when ready':`${restTarget-restSec}s until target`}</span><span>{restTarget}s</span></div>
            </div>

      {/* Plan view */}
      {(view==='plan'||!isGym)&&day.exercises.map(ex=>{
        const done=sFor(ex.id).length;const comp=isGym&&done>=ex.sets;const open=adding===ex.id;const tipOpen=showTip===ex.id;const c=MC[ex.muscle]||'#555';const ic=ICONS[ex.muscle]||'•';
        return(<div key={ex.id} style={{background:'#111',borderRadius:10,overflow:'hidden',borderLeft:`3px solid ${comp?'#27ae6088':c}`,opacity:comp?.5:1,marginBottom:6}}>

            <span style={{fontSize:18,width:24,textAlign:'center'}}>{comp?'✅':ic}</span>
            <div style={{flex:1,cursor:isGym?'pointer':'default'}} onClick={()=>!comp&&isGym&&setAdding(open?null:ex.id)}>
              <div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:13,fontWeight:600,color:comp?'#555':'#ddd'}}>{ex.name}</span><span style={{fontSize:8,padding:'2px 6px',borderRadius:10,background:`${c}22`,color:c}}>{ex.muscle}</span></div>
              {isGym&&<div style={{fontSize:10,color:'#555',marginTop:2}}>{ex.sets}×{ex.reps} · {ex.rest}s rest</div>}
            </div>
            {isGym&&<div style={{fontSize:14,fontWeight:700,color:comp?'#27ae60':'#888',minWidth:40,textAlign:'right'}}>{done}/{ex.sets}</div>}
            <button onClick={()=>setShowTip(tipOpen?null:ex.id)} style={{background:'none',border:`1px solid ${tipOpen?'#e74c3c':'#222'}`,borderRadius:6,color:tipOpen?'#e74c3c':'#444',padding:'3px 7px',cursor:'pointer',fontSize:10,...S}}>?</button>
          </div>
          {tipOpen&&<div style={{padding:'0 14px 12px 48px'}}><div style={{fontSize:11,color:'#999',lineHeight:1.6,background:'#0d0d0d',padding:'10px 12px',borderRadius:8,borderLeft:`2px solid ${c}`}}>{ex.tip}</div></div>}
          {done>0&&isGym&&<div style={{padding:'0 14px 8px 48px',display:'flex',flexWrap:'wrap',gap:4}}>{sFor(ex.id).map(s=>(<span key={s.id} onClick={()=>del(s.id)} style={{fontSize:10,padding:'3px 8px',borderRadius:4,background:'#1a1a1a',color:'#888',cursor:'pointer',border:'1px solid #222'}}>{s.weight>0?`${s.weight}kg×`:''}{s.reps} <span style={{color:'#333',marginLeft:3}}>✕</span></span>))}</div>}
          {open&&isGym&&<div style={{padding:'0 14px 14px',display:'flex',gap:8,alignItems:'flex-end'}}>
            <div style={{flex:1}}><label style={{fontSize:9,color:'#444',letterSpacing:1,display:'block',marginBottom:3}}>KG</label><input type="number" value={weight} onChange={e=>setWeight(e.target.value)} placeholder="0" autoFocus style={{width:'100%',padding:'9px 8px',background:'#0a0a0a',border:'1px solid #222',borderRadius:6,color:'#fff',fontSize:15,...S,boxSizing:'border-box'}}/></div>
            <div style={{flex:1}}><label style={{fontSize:9,color:'#444',letterSpacing:1,display:'block',marginBottom:3}}>REPS</label><input type="number" value={reps} onChange={e=>setReps(e.target.value)} placeholder={ex.reps} style={{width:'100%',padding:'9px 8px',background:'#0a0a0a',border:'1px solid #222',borderRadius:6,color:'#fff',fontSize:15,...S,boxSizing:'border-box'}}/></div>
            <button onClick={()=>logSet(ex.id)} style={{padding:'9px 16px',background:'#e74c3c',border:'none',borderRadius:6,color:'#fff',fontWeight:700,fontSize:12,cursor:'pointer',...S,letterSpacing:1,whiteSpace:'nowrap'}}>LOG</button>
          </div>}
          {!isGym&&!comp&&<div style={{padding:'0 14px 12px 48px'}}>{sFor(ex.id).length===0?<button onClick={()=>logSet(ex.id)} style={{padding:'8px 16px',background:'#1a1a1a',border:'1px solid #222',borderRadius:6,color:'#888',fontSize:11,cursor:'pointer',...S}}>Mark Complete ✓</button>:<span style={{fontSize:11,color:'#27ae60'}}>✓ Done</span>}</div>}
        </div>);
      })}

      {/* Log view */}
      {view==='log'&&isGym&&<div style={{display:'flex',flexDirection:'column',gap:6}}>
        {daySets.length===0&&<div style={{textAlign:'center',padding:40,color:'#333',fontSize:12}}>No sets logged yet</div>}
        {daySets.map((s,i)=>{const ex=day.exercises.find(e=>e.id===s.exercise);const c=MC[ex?.muscle]||'#555';return(
          <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'#111',borderRadius:8,borderLeft:`3px solid ${c}`}}>
            <span style={{fontSize:14}}>{ICONS[ex?.muscle]||'•'}</span><div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:'#ddd'}}>{ex?.name}</div><div style={{fontSize:10,color:'#666',marginTop:1}}>{s.weight>0?`${s.weight}kg × `:''}{s.reps} reps</div></div>
            <div style={{fontSize:10,color:'#333'}}>#{i+1}</div><button onClick={()=>del(s.id)} style={{background:'none',border:'none',color:'#333',cursor:'pointer',fontSize:13}}>✕</button>
          </div>);})}
      </div>}

      {/* Summary view */}
      {view==='summary'&&isGym&&<div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>{[{l:'SETS',v:daySets.length},{l:'VOLUME',v:`${vol}kg`},{l:'DONE',v:`${pct}%`}].map(s=>(<div key={s.l} style={{padding:'14px 10px',background:'#111',borderRadius:8,textAlign:'center'}}><div style={{fontSize:20,fontWeight:700,color:'#fff'}}>{s.v}</div><div style={{fontSize:9,color:'#555',letterSpacing:2,marginTop:3}}>{s.l}</div></div>))}</div>
        <div style={{fontSize:10,color:'#444',letterSpacing:2,marginBottom:8}}>BY EXERCISE</div>
        {Object.entries(daySets.reduce((a,s)=>{(a[s.exercise]=a[s.exercise]||[]).push(s);return a;},{})).map(([exId,exSets])=>{const ex=day.exercises.find(e=>e.id===exId);const best=exSets.reduce((b,s)=>((parseFloat(s.weight)||0)*(parseInt(s.reps)||0)>(parseFloat(b.weight)||0)*(parseInt(b.reps)||0)?s:b),exSets[0]);const c=MC[ex?.muscle]||'#555';return(
          <div key={exId} style={{padding:'12px 14px',background:'#111',borderRadius:8,marginBottom:6,borderLeft:`3px solid ${c}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:12,fontWeight:600,color:'#ddd'}}>{ICONS[ex?.muscle]} {ex?.name} <span style={{color:'#444',fontWeight:400,fontSize:11}}>{exSets.length}s</span></span><span style={{fontSize:11,color:'#888'}}>Best: {best.weight>0?`${best.weight}kg×`:''}{best.reps}</span></div>);})}
      </div>}

      {/* Motivation */}
      {mot&&isGym&&<div style={{marginTop:16,padding:'14px 16px',borderRadius:10,background:pct===100?'linear-gradient(135deg,#0d1a0d,#1a2a1a)':'#111',border:`1px solid ${pct===100?'#27ae6033':'#1a1a1a'}`}}>
        <div style={{fontSize:10,color:pct===100?'#27ae60':pct>=70?'#e67e22':'#e67e22',letterSpacing:2,marginBottom:4}}>{pct===100?'SESSION COMPLETE':pct>=70?'SOLID EFFORT':pct>=40?'KEEP SHOWING UP':'EVERY REP COUNTS'}</div>
        <div style={{fontSize:11,color:'#999',lineHeight:1.7}}>{mot}</div>
      </div>}
      {!isGym&&daySets.length>0&&<div style={{marginTop:16,padding:'14px 16px',borderRadius:10,background:'linear-gradient(135deg,#0d1a0d,#1a2a1a)',border:'1px solid #27ae6033'}}>
        <div style={{fontSize:10,color:'#27ae60',letterSpacing:2,marginBottom:4}}>DONE FOR THE DAY</div>
        <div style={{fontSize:11,color:'#999',lineHeight:1.7}}>{activeDay==='mon_pm'?'Soccer done. Eat protein + carbs for tomorrow.':activeDay==='wed'?'Intervals done. Refuel with carbs.':activeDay==='thu'?'Climbing done. Omega-3s and protein tonight.':'Active day ticked off. Rest up for the week ahead.'}</div>
      </div>}

      {/* Progression rule */}
      <div style={{marginTop:12,padding:'12px 14px',background:'#0d1117',borderRadius:10,border:'1px solid #e74c3c22'}}>
        <div style={{fontSize:10,color:'#e74c3c',letterSpacing:2,marginBottom:6}}>PROGRESSION RULE</div>
        <div style={{fontSize:11,color:'#888',lineHeight:1.6}}>Hit the <span style={{color:'#fff'}}>top of the rep range</span> across all sets? Go up <span style={{color:'#fff'}}>2-4kg</span> next session. Deload every 4-5 weeks.</div>
      </div>
    </div>
  );
}

function NutritionTracker() {
  const [bw, setBw] = useLS('nut_weight', 85);
  const [dayType, setDayType] = useDailyLS('nut_dayType', 'strength');
  const [logged, setLogged] = useDailyLS('nut_logged', []);
  const [water, setWater] = useDailyLS('nut_water', 0);
  const [view, setView] = useState('track');
  const [addingTo, setAddingTo] = useState(null);
  const [showQuick, setShowQuick] = useState(false);
  const [cn, setCn] = useState('');
  const [cp, setCp] = useState('');
  const [cc, setCc] = useState('');
  const [cf, setCf] = useState('');

  const dt = N_TYPES.find(d=>d.id===dayType);
  const tgt = {protein:Math.round(bw*dt.pm),carbs:Math.round(bw*dt.cm),fat:Math.round(bw*dt.fm)};
  tgt.cal = tgt.protein*4+tgt.carbs*4+tgt.fat*9;
  const tot = logged.reduce((a,l)=>({p:a.p+l.p,c:a.c+l.c,f:a.f+l.f,cal:a.cal+l.cal}),{p:0,c:0,f:0,cal:0});
  const waterTgt = Math.round(bw*.035*10)/10;

  const addFood = (food,slot) => {setLogged(p=>[...p,{...food,id:Date.now(),slot}]);setAddingTo(null);setShowQuick(false);};
  const addCustom = slot => {if(!cn)return;const p=parseInt(cp)||0,c=parseInt(cc)||0,f=parseInt(cf)||0;addFood({name:cn,p,c,f,cal:p*4+c*4+f*9},slot);setCn('');setCp('');setCc('');setCf('');};
  const del = id => setLogged(p=>p.filter(l=>l.id!==id));
  const pctOf = (v,t) => Math.min(Math.round(v/t*100),100);

  const Bar = ({label,cur,tgt:t,color,unit}) => (
    <div style={{marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}><span style={{color:'#888'}}>{label}</span><span style={{color:cur>=t?'#27ae60':'#fff'}}>{cur}<span style={{color:'#555'}}>/{t}{unit||'g'}</span></span></div>
      <div style={{height:6,background:'#1a1a1a',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',width:`${pctOf(cur,t)}%`,background:cur>t*1.1?'#e74c3c':color,borderRadius:3,transition:'width .3s'}}/></div>
    </div>
  );

  return (
    <div style={{padding:'14px 12px',maxWidth:480,margin:'0 auto'}}>
      <div style={{marginBottom:14}}><div style={{fontSize:10,letterSpacing:3,color:'#27ae60',textTransform:'uppercase',marginBottom:2}}>Hybrid Athlete Fuel</div><div style={{fontSize:20,fontWeight:700,color:'#fff'}}>Nutrition Tracker</div></div>

      {/* Weight + day type */}
      <div style={{display:'flex',gap:10,marginBottom:14}}>
        <div style={{flex:'0 0 80px'}}><label style={{fontSize:9,color:'#444',letterSpacing:1,display:'block',marginBottom:3}}>WEIGHT KG</label><input type="number" value={bw} onChange={e=>setBw(parseInt(e.target.value)||0)} style={{width:'100%',padding:8,background:'#111',border:'1px solid #222',borderRadius:6,color:'#fff',fontSize:14,...S,boxSizing:'border-box',textAlign:'center'}}/></div>
        <div style={{flex:1}}><label style={{fontSize:9,color:'#444',letterSpacing:1,display:'block',marginBottom:3}}>TODAY'S SESSION</label>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{N_TYPES.map(d=>(<button key={d.id} onClick={()=>setDayType(d.id)} style={{padding:'6px 8px',borderRadius:6,border:dayType===d.id?'1px solid #27ae6044':'1px solid #222',cursor:'pointer',...S,background:dayType===d.id?'#1a2a1a':'#111',color:dayType===d.id?'#27ae60':'#555',fontSize:10}}>{d.icon} {d.label}</button>))}</div>
        </div>
      </div>

      {/* Macro dashboard */}
      <div style={{padding:14,background:'#111',borderRadius:10,marginBottom:14,border:'1px solid #1a1a1a'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,marginBottom:14}}>
          {[{l:'CALS',v:tot.cal,t:tgt.cal,c:'#f39c12'},{l:'PROT',v:tot.p,t:tgt.protein,c:'#e74c3c'},{l:'CARBS',v:tot.c,t:tgt.carbs,c:'#3498db'},{l:'FAT',v:tot.f,t:tgt.fat,c:'#9b59b6'}].map(s=>(
            <div key={s.l} style={{textAlign:'center'}}><div style={{fontSize:16,fontWeight:700,color:s.v>=s.t?'#27ae60':'#fff'}}>{s.v}</div><div style={{fontSize:8,color:'#555'}}>/{s.t}</div><div style={{fontSize:8,color:'#444',letterSpacing:1,marginTop:2}}>{s.l}</div></div>
          ))}
        </div>
        <Bar label="Protein" cur={tot.p} tgt={tgt.protein} color="#e74c3c"/>
        <Bar label="Carbs" cur={tot.c} tgt={tgt.carbs} color="#3498db"/>
        <Bar label="Fat" cur={tot.f} tgt={tgt.fat} color="#9b59b6"/>
        <Bar label="Calories" cur={tot.cal} tgt={tgt.cal} color="#f39c12" unit="cal"/>
      </div>

      {/* Hydration */}
      <div style={{padding:'12px 14px',background:'#111',borderRadius:10,marginBottom:14,display:'flex',alignItems:'center',gap:12,border:'1px solid #1a1a1a'}}>
        <span style={{fontSize:20}}>💧</span>
        <div style={{flex:1}}><div style={{fontSize:11,color:'#888'}}>Water: <span style={{color:water>=waterTgt?'#27ae60':'#fff'}}>{water}L</span><span style={{color:'#555'}}> / {waterTgt}L</span></div><div style={{marginTop:4,height:4,background:'#1a1a1a',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:`${pctOf(water*10,waterTgt*10)}%`,background:'#3498db',borderRadius:2,transition:'width .3s'}}/></div></div>
        <div style={{display:'flex',gap:4}}>{[.25,.5,.75].map(a=>(<button key={a} onClick={()=>setWater(w=>Math.round((w+a)*100)/100)} style={{padding:'6px 8px',background:'#0a0a0a',border:'1px solid #222',borderRadius:6,color:'#888',fontSize:10,cursor:'pointer',...S}}>+{a}L</button>))}</div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',marginBottom:14,borderBottom:'1px solid #1a1a1a'}}>{[['track','Log Food'],['meals','Meal Ideas']].map(([k,l])=>(<button key={k} onClick={()=>setView(k)} style={{flex:1,padding:'8px 0',background:'none',border:'none',...S,color:view===k?'#fff':'#444',fontSize:10,letterSpacing:2,textTransform:'uppercase',cursor:'pointer',borderBottom:view===k?'2px solid #27ae60':'2px solid transparent'}}>{l}</button>))}</div>

      {/* Log food */}
      {view==='track'&&MEALS.filter(s=>!(dayType==='rest'&&(s.id==='pre'||s.id==='post'))).map(slot=>{
        const items=logged.filter(l=>l.slot===slot.id);const sp=items.reduce((s,l)=>s+l.p,0);const isA=addingTo===slot.id;
        return(<div key={slot.id} style={{marginBottom:10,background:'#111',borderRadius:10,overflow:'hidden',border:'1px solid #1a1a1a'}}>
          <div onClick={()=>setAddingTo(isA?null:slot.id)} style={{padding:'12px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:18}}>{slot.icon}</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:'#ddd'}}>{slot.label}</div><div style={{fontSize:10,color:'#555'}}>{slot.time}</div></div>
            {sp>0&&<span style={{fontSize:10,color:'#e74c3c',background:'#e74c3c22',padding:'2px 8px',borderRadius:10}}>{sp}g protein</span>}
            <span style={{color:'#333',fontSize:14}}>{isA?'▲':'▼'}</span>
          </div>
          {items.length>0&&<div style={{padding:'0 14px 8px 48px'}}>{items.map(item=>(
            <div key={item.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',borderBottom:'1px solid #1a1a1a'}}>
              <span style={{fontSize:11,color:'#999'}}>{item.name}</span><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:9,color:'#555'}}>P{item.p} C{item.c} F{item.f}</span><button onClick={()=>del(item.id)} style={{background:'none',border:'none',color:'#333',cursor:'pointer',fontSize:12}}>✕</button></div>
            </div>))}</div>}
          {isA&&<div style={{padding:'0 14px 14px'}}>
            <div style={{fontSize:10,color:'#27ae60',background:'#0d1a0d',padding:'8px 10px',borderRadius:6,marginBottom:10,lineHeight:1.5,borderLeft:'2px solid #27ae6044'}}>💡 {MIDEAS[dayType]?.[slot.id]||'Log your food'}</div>
            <button onClick={()=>setShowQuick(!showQuick)} style={{width:'100%',padding:8,background:'#0a0a0a',border:'1px solid #222',borderRadius:6,color:'#888',fontSize:10,cursor:'pointer',...S,marginBottom:8}}>{showQuick?'Hide':'Show'} Quick Add ▾</button>
            {showQuick&&<div style={{maxHeight:200,overflowY:'auto',marginBottom:10}}>{QFOODS.map((f,i)=>(<button key={i} onClick={()=>addFood(f,slot.id)} style={{width:'100%',padding:'8px 10px',background:'#0a0a0a',border:'none',borderBottom:'1px solid #1a1a1a',cursor:'pointer',textAlign:'left',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:11,color:'#ccc'}}>{f.name}</span><span style={{fontSize:9,color:'#555'}}>P{f.p} C{f.c} F{f.f} · {f.cal}cal</span></button>))}</div>}
            <div style={{fontSize:9,color:'#444',letterSpacing:1,marginBottom:4}}>CUSTOM</div>
            <input value={cn} onChange={e=>setCn(e.target.value)} placeholder="Food name" style={{width:'100%',padding:8,background:'#0a0a0a',border:'1px solid #222',borderRadius:6,color:'#fff',fontSize:12,...S,boxSizing:'border-box',marginBottom:6}}/>
            <div style={{display:'flex',gap:6}}>{[['P',cp,setCp,'#e74c3c'],['C',cc,setCc,'#3498db'],['F',cf,setCf,'#9b59b6']].map(([l,v,fn,col])=>(<div key={l} style={{flex:1}}><label style={{fontSize:9,color:col,display:'block',marginBottom:2}}>{l}</label><input type="number" value={v} onChange={e=>fn(e.target.value)} placeholder="0" style={{width:'100%',padding:7,background:'#0a0a0a',border:'1px solid #222',borderRadius:6,color:'#fff',fontSize:12,...S,boxSizing:'border-box'}}/></div>))}<button onClick={()=>addCustom(slot.id)} style={{padding:'7px 14px',background:'#27ae60',border:'none',borderRadius:6,color:'#fff',fontWeight:700,fontSize:11,cursor:'pointer',...S,alignSelf:'flex-end'}}>+</button></div>
          </div>}
        </div>);
      })}

      {/* Meal ideas */}
      {view==='meals'&&<div>
        <div style={{fontSize:11,color:'#888',marginBottom:12,lineHeight:1.6}}>Meals for <span style={{color:'#27ae60'}}>{dt.label}</span>. Target: <span style={{color:'#e74c3c'}}>30-40g protein</span> per meal across 4-5 meals.</div>
        {MEALS.filter(s=>!(dayType==='rest'&&(s.id==='pre'||s.id==='post'))).map(slot=>(
          <div key={slot.id} style={{padding:'12px 14px',background:'#111',borderRadius:10,marginBottom:8,borderLeft:'3px solid #27ae6044'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}><span style={{fontSize:16}}>{slot.icon}</span><span style={{fontSize:12,fontWeight:600,color:'#ddd'}}>{slot.label}</span><span style={{fontSize:9,color:'#555'}}>{slot.time}</span></div>
            <div style={{fontSize:11,color:'#999',lineHeight:1.6}}>{MIDEAS[dayType]?.[slot.id]}</div>
          </div>
        ))}
        <div style={{marginTop:16,padding:14,background:'#0d1117',borderRadius:10,border:'1px solid #27ae6022'}}>
          <div style={{fontSize:10,color:'#27ae60',letterSpacing:2,marginBottom:8}}>DAILY TARGETS BY DAY TYPE</div>
          {N_TYPES.map(d=>{const p=Math.round(bw*d.pm),c=Math.round(bw*d.cm),f=Math.round(bw*d.fm);return(
            <div key={d.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #1a1a1a'}}><span style={{fontSize:11,color:dayType===d.id?'#27ae60':'#888'}}>{d.icon} {d.label}</span><span style={{fontSize:10,color:'#555'}}>P{p} · C{c} · F{f} · {p*4+c*4+f*9}cal</span></div>
          );})}
        </div>
      </div>}

      <div style={{marginTop:20,padding:'10px 14px',borderTop:'1px solid #1a1a1a'}}><div style={{fontSize:9,color:'#333',lineHeight:1.6,textAlign:'center'}}>Macros: ISSN Position Stand (1.6-2.2g/kg protein) · Hybrid athlete carb research (4-7g/kg)</div></div>
    </div>
  );
}

// ═══════════════════════════════════════════
// APP SHELL — TAB SWITCHER
// ═══════════════════════════════════════════
function App() {
  const [tab, setTab] = useLS('app_tab', 'gym');
  return (
    <div style={{minHeight:'100vh',background:'#0a0a0a',color:'#e8e8e8',...S}}>
      {tab==='gym' ? <GymTracker/> : <NutritionTracker/>}
      {/* Bottom tab bar */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'#0a0a0a',borderTop:'1px solid #1a1a1a',display:'flex',padding:'8px 0 max(8px, env(safe-area-inset-bottom))',zIndex:100}}>
        {[['gym','🏋️','Training'],['nutrition','🥗','Nutrition']].map(([id,icon,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,background:'none',border:'none',cursor:'pointer',...S,textAlign:'center',padding:'4px 0'}}>
            <div style={{fontSize:20}}>{icon}</div>
            <div style={{fontSize:9,color:tab===id?'#e74c3c':'#444',letterSpacing:1,marginTop:2}}>{label}</div>
          </button>
        ))}
      </div>
      <div style={{height:70}}/>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
  </script>
</body>
